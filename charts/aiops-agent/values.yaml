replicaCount: 1

image:
  repository: ghcr.io/jimytar/aiops-agent
  tag: ""  # defaults to .Chart.AppVersion; override for canary/dev deploys
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

agent:
  claudeModel: claude-sonnet-4-6
  webhookPort: 8080
  confirmationTimeoutSeconds: 300
  maxToolOutputBytes: 8192
  # execTimeoutSeconds: 120     # timeout for kubectl exec and SSH commands
  # runbookDir: ""              # override default /etc/aiops/runbooks mount path
  # systemPrompt: ""            # override the entire system prompt (multiline string)

  # Telegram chat IDs allowed to interact with the bot.
  # Can also be set via ALLOWED_CHAT_IDS env (comma-separated).
  allowedChatIDs: []
  # Chat ID that receives webhook-triggered messages.
  defaultChatID: ""

  # Cluster configuration. inCluster:true uses the pod's own ServiceAccount.
  clusters:
    - name: bastion
      inCluster: true
    # - name: simitli-k8s
    #   kubeconfigFile: simitli-k8s   # filename under /etc/aiops/kubeconfigs/

  # SSH host aliases. Values are non-secret (user + host); keys are mounted separately.
  sshHosts: {}
  #   node1:
  #     user: root
  #     host: 192.168.1.10
  #     port: 22

  # Allowlisted SSH commands (prefixes).
  sshAllowedReadonly:
    - "systemctl status"
    - "journalctl"
    - "df -h"
    - "df -H"
    - "free -h"
    - "uptime"
    - "uname"
    - "hostname"
    - "ps aux"
    - "top -bn1"
  sshAllowedMutating:
    - "systemctl restart"
    - "systemctl stop"
    - "systemctl start"

  # Paths to git repos the agent can inspect/pull.
  # When gitRepos.enabled is true, mountPaths from gitRepos.repos are used automatically.
  gitRepoDirs: []

  # Prefix-allowlist for kubectl exec commands (kubectl_exec tool).
  # Commands that do not match any prefix are rejected before execution.
  kubectlExecAllowedCommands:
    - "env"
    - "ls"
    - "cat "
    - "ps aux"
    - "df -h"
    - "free -h"
    - "uptime"
    - "psql "
    - "redis-cli "
    - "mysql "
    - "mongosh "

  # Tool control — disable built-in tools and/or override their confirmation tier.
  tools:
    # Tools to remove entirely from Claude's tool list.
    # Valid names: kubectl_get, kubectl_describe, kubectl_logs, kubectl_get_events,
    #   kubectl_restart, kubectl_scale, kubectl_rollout, kubectl_delete,
    #   helm_list, helm_status, helm_rollback,
    #   git_status, git_log, git_pull,
    #   ssh_exec_readonly, ssh_exec
    disabled: []
    #   - kubectl_delete
    #   - ssh_exec

    # Override the default confirmation tier for specific tools.
    # readonly   = execute immediately (no confirmation)
    # mutating   = requires nonce confirmation
    # destructive = requires confirmation + resource name re-entry
    tiers: {}
    #   kubectl_restart: readonly   # skip confirmation for restarts
    #   git_pull: readonly          # skip confirmation for git pull

  # Frigate NVR base URL. Leave empty to disable camera tools.
  frigateURL: ""

  # Generic REST API integrations. Each entry generates one tool per endpoint
  # named "<name>_<endpointName>" (e.g. sonarr_calendar, radarr_movie_add).
  # GET endpoints are readonly (no confirmation). POST/PUT are mutating (require
  # confirmation). DELETE is destructive. Override per-endpoint with tier:.
  # API keys are read from environment variables injected via apiKeySecretName.
  httpIntegrations: []
  #   - name: sonarr
  #     baseURL: https://sonarr.home.local
  #     apiKeyEnv: SONARR_API_KEY
  #     apiKeyHeader: X-Api-Key          # default, can omit
  #     apiKeySecretName: aiops-sonarr-key
  #     apiKeySecretKey: api-key
  #     # Defaults merged into every POST/PUT body automatically.
  #     defaults:
  #       qualityProfileId: 1
  #       rootFolderPath: /tv
  #       monitored: true
  #       seasonFolder: true
  #       addOptions:
  #         searchForMissingEpisodes: true
  #     endpoints:
  #       - name: series
  #         path: /api/v3/series
  #         description: List all monitored TV shows in Sonarr.
  #       - name: series_lookup
  #         path: /api/v3/series/lookup
  #         description: Search for a TV show by name. Pass {\"term\": \"show name\"} as query_params. Returns TVDB ID and metadata needed to add the show.
  #       - name: series_add
  #         path: /api/v3/series
  #         method: POST
  #         description: Add a TV show to Sonarr. Requires tvdbId, title, and titleSlug from series_lookup. Defaults (qualityProfileId, rootFolderPath, monitored) are applied automatically.
  #       - name: calendar
  #         path: /api/v3/calendar
  #         description: Upcoming episodes releasing in the next 7 days.
  #       - name: queue
  #         path: /api/v3/queue
  #         description: Current download queue (in-progress downloads).
  #       - name: command
  #         path: /api/v3/command
  #         method: POST
  #         description: Trigger a Sonarr command. E.g. {\"name\": \"SeriesSearch\", \"seriesId\": 123} or {\"name\": \"RefreshSeries\"}.
  #
  #   - name: radarr
  #     baseURL: https://radarr.home.local
  #     apiKeyEnv: RADARR_API_KEY
  #     apiKeySecretName: aiops-radarr-key
  #     apiKeySecretKey: api-key
  #     defaults:
  #       qualityProfileId: 1
  #       rootFolderPath: /movies
  #       monitored: true
  #       addOptions:
  #         searchForMovie: true
  #     endpoints:
  #       - name: movies
  #         path: /api/v3/movie
  #         description: List all movies in Radarr.
  #       - name: movie_lookup
  #         path: /api/v3/movie/lookup
  #         description: Search for a movie by name. Pass {\"term\": \"movie name\"} as query_params. Returns TMDB ID and metadata needed to add the movie.
  #       - name: movie_add
  #         path: /api/v3/movie
  #         method: POST
  #         description: Add a movie to Radarr. Requires tmdbId and title from movie_lookup. Defaults (qualityProfileId, rootFolderPath, monitored) are applied automatically.
  #       - name: queue
  #         path: /api/v3/queue
  #         description: Current download queue.
  #       - name: command
  #         path: /api/v3/command
  #         method: POST
  #         description: Trigger a Radarr command. E.g. {\"name\": \"MoviesSearch\", \"movieIds\": [123]}.
  #
  #   - name: jellyfin
  #     baseURL: https://jellyfin.home.local
  #     apiKeyEnv: JELLYFIN_API_KEY
  #     apiKeyHeader: X-Emby-Token
  #     apiKeySecretName: aiops-jellyfin-key
  #     apiKeySecretKey: api-key
  #     endpoints:
  #       - name: sessions
  #         path: /Sessions
  #         description: List active Jellyfin playback sessions (who is watching what).
  #       - name: items
  #         path: /Items?IncludeItemTypes=Movie,Series&Recursive=true&Fields=Name,ProductionYear,OfficialRating
  #         description: Browse the Jellyfin media library (movies and series).
  #       - name: activity
  #         path: /System/ActivityLog/Entries?limit=20
  #         description: Recent Jellyfin activity log entries.
  #
  #   - name: prowlarr
  #     baseURL: https://prowlarr.home.local
  #     apiKeyEnv: PROWLARR_API_KEY
  #     apiKeySecretName: aiops-prowlarr-key
  #     apiKeySecretKey: api-key
  #     endpoints:
  #       - name: indexers
  #         path: /api/v1/indexer
  #         description: List all configured Prowlarr indexers and their status.
  #       - name: search
  #         path: /api/v1/search
  #         description: Search across all indexers. Pass {\"query\": \"term\", \"type\": \"search\"} as query_params.

  # MCP servers Claude connects to via the Beta API.
  # tokenSecretName/tokenSecretKey point to a pre-existing SOPS-encrypted secret;
  # the value is injected as an env var named by tokenEnv.
  mcpServers: []
  #   - name: home-assistant
  #     url: https://ha.jimytar.com/api/mcp
  #     tokenEnv: HA_MCP_TOKEN
  #     tokenSecretName: aiops-ha-token
  #     tokenSecretKey: token
  #     # Allowlist specific HA services (empty = all tools exposed):
  #     allowedTools: []
  #       - light.turn_on
  #       - light.turn_off
  #       - climate.set_temperature
  #       - cover.open_cover
  #       - cover.close_cover
  #     # Remove specific tools from the allowlist (ignored if allowedTools is empty):
  #     deniedTools: []
  #       - homeassistant.restart

# Runbooks — operational knowledge injected into Claude's system prompt at startup.
# Any *.md file mounted at /etc/aiops/runbooks/ is appended automatically.
#
# Two mutually exclusive options:
#   inline          — define runbooks directly in values.yaml; the chart generates
#                     a ConfigMap named <release>-runbooks and mounts it.
#   existingConfigMap — name of a pre-existing ConfigMap whose keys are *.md files.
#                       Use this when runbooks are managed outside of Helm (e.g. SOPS,
#                       a separate GitOps repo, or kubectl apply).
runbooks:
  # inline: {}
  #   oom-runbook.md: |
  #     ## OOMKilled Runbook
  #     When a pod is OOMKilled:
  #     1. Check current memory requests: kubectl describe pod <name>
  #     2. Check actual usage trend in Grafana dashboard (namespace/pod memory panel)
  #     3. If usage consistently exceeds requests, bump resources.requests.memory
  #        and resources.limits.memory in the deployment manifest and git_push.
  #     4. If spike is abnormal (e.g. memory leak), restart and open an investigation.
  #
  #   deploy-runbook.md: |
  #     ## Deployment Runbook
  #     Standard deploy process:
  #     1. Update the image tag in charts/<app>/values.yaml
  #     2. git_commit + git_push to trigger Flux reconciliation
  #     3. Watch rollout: kubectl rollout status deployment/<name>
  #     4. Verify readiness probes pass before declaring success.
  inline: {}
  # existingConfigMap: aiops-runbooks

# Names of pre-existing Secrets (SOPS-encrypted, created separately).
existingSecrets:
  telegramToken:
    secretName: aiops-telegram-token
    key: token
  anthropicAPIKey:
    secretName: aiops-claude-api-key
    key: api-key
  webhookToken:
    secretName: aiops-webhook-token
    key: token
  sshKeys:
    secretName: aiops-ssh-keys
  # One entry per remote cluster kubeconfig.
  kubeconfigs: []
  #   - secretName: aiops-kubeconfig-simitli
  #     key: kubeconfig
  #     filename: simitli-k8s    # written to /etc/aiops/kubeconfigs/simitli-k8s

ingress:
  enabled: false
  className: traefik
  host: aiops.example.com
  annotations: {}
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"
  #   traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
  # TLS secret name (optional, omit to rely on certresolver)
  tlsSecret: ""

# Git repositories to clone at pod startup via init container.
# The GitHub token is used for HTTPS auth; credentials are embedded
# in each repo's remote URL so subsequent pull/push work without re-auth.
gitRepos:
  enabled: false
  tokenSecretName: aiops-github-token
  tokenSecretKey: token
  repos: []
  #   - name: deployments
  #     url: https://github.com/jimytar/deployments
  #     mountPath: /repos/deployments
  #   - name: infrastructure
  #     url: https://github.com/jimytar/infrastructure
  #     mountPath: /repos/infrastructure

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
